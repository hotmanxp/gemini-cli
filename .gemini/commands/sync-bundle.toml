description = "Builds and syncs bundle to pnpm_global"
prompt = """
Builds the Gemini CLI bundle and synchronizes it to the global pnpm directory.

This command performs the following steps:
1. Runs `npm run bundle` to build the production bundle
2. Syncs the bundle directory to /Users/ethan/node/pnpm_global/bundle/ using rsync

**Execute the following commands:**

```bash
# Step 1: Build the bundle
npm run bundle

# Step 2: Sync to global pnpm directory
rsync -av --delete /Users/ethan/code/gemini-cli/bundle/ /Users/ethan/node/pnpm_global/bundle/
```

After completion, confirm the sync was successful by listing the bundle directory:
```bash
ls -lh /Users/ethan/node/pnpm_global/bundle/
```

- Report the following:
- Bundle build status (success/failed)
- Number of files transferred
- Size of the main gemini.js file
- Any errors encountered during sync
"""
